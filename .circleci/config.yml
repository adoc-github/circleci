jobs:
  build-and-publish:
    docker:
      - image: circleci/ruby:2.4.1
    steps:
      - checkout
      - run:
          command: |
            cp -ar ./* wordpress/
            mkdir -p build_artifact
            tar -zcvf  ./build_artifact/wordpress-latest.tar.gz ./wordpress/*
          name: Archive app
      - aws-s3/copy:
          from: ./build_artifact/wordpress-latest.tar.gz
          to: "s3://colony-repository/"
orbs:
  aws-s3: circleci/aws-s3@1.0.11
  colony: quali/cloudshell-colony@1.0.4
version: 2.1
workflows:
  leadeasy:
    jobs:
      - build-and-publish
